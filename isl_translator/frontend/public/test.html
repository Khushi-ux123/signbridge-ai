<!DOCTYPE html>
<html>
<head><title>WS Debug</title></head>
<body style="background:#111;color:#fff;font-family:monospace;padding:20px">
<h2>WebSocket + Camera Debug</h2>
<video id="v" width="320" height="240" autoplay muted playsinline style="border:1px solid #444"></video>
<canvas id="c" width="640" height="480" style="display:none"></canvas>
<br><br>
<button onclick="start()">Start Test</button>
<button onclick="stop()">Stop</button>
<pre id="log" style="background:#000;padding:10px;height:300px;overflow-y:auto;margin-top:10px"></pre>

<script>
let ws, stream, interval;
const log = (msg) => {
  const el = document.getElementById('log');
  el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
};

async function start() {
  log('Getting camera...');
  try {
    stream = await navigator.mediaDevices.getUserMedia({video:true});
    const v = document.getElementById('v');
    v.srcObject = stream;
    await v.play();
    log('Camera OK — videoWidth: ' + v.videoWidth + ' readyState: ' + v.readyState);

    log('Connecting WS to ws://localhost:8000/ws ...');
    ws = new WebSocket('ws://localhost:8000/ws');

    ws.onopen = () => {
      log('WS OPEN — starting frame send');
      let sent = 0;
      interval = setInterval(() => {
        const v = document.getElementById('v');
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        ctx.drawImage(v, 0, 0, 640, 480);
        const data = c.toDataURL('image/jpeg', 0.6);
        ws.send(data);
        sent++;
        if (sent % 10 === 0) log('Sent ' + sent + ' frames, WS state: ' + ws.readyState);
      }, 100);
    };

    ws.onmessage = (e) => {
      const d = JSON.parse(e.data);
      log('MSG: buffering=' + d.buffering + '/' + d.buffer_needed + ' pred=' + JSON.stringify(d.prediction) + ' conf=' + (d.confidence||0).toFixed(2));
    };

    ws.onerror = (e) => log('WS ERROR: ' + JSON.stringify(e));
    ws.onclose = (e) => log('WS CLOSED code=' + e.code);

  } catch(e) {
    log('ERROR: ' + e.message);
  }
}

function stop() {
  if (interval) clearInterval(interval);
  if (ws) ws.close();
  if (stream) stream.getTracks().forEach(t => t.stop());
  log('Stopped');
}
</script>
</body>
</html>
